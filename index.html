<!-- For Ms. Prettiest Kehkashan in all of Kehkashan, I Love You -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kehkashan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

    /* ── CUSTOM SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(
        to bottom,
        rgba(255, 250, 205, 0.08),
        rgba(255, 245, 160, 0.38),
        rgba(255, 210, 100, 0.28),
        rgba(255, 250, 205, 0.08)
      );
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(255, 245, 160, 0.25);
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(
        to bottom,
        rgba(255, 250, 205, 0.15),
        rgba(255, 245, 160, 0.58),
        rgba(255, 210, 100, 0.42),
        rgba(255, 250, 205, 0.15)
      );
      box-shadow: 0 0 10px rgba(255, 245, 160, 0.45);
    }
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 245, 160, 0.28) transparent;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: #0a0e27;
      color: #e0e6ff;
      overflow: hidden;
    }

    #cursor-trail-canvas-global {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
    }

    #enter-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0e27;
      cursor: default;
    }

    .speaker-icon { cursor: pointer; }

    .speaker-icon {
      width: 90px;
      height: 90px;
      color: #fffacd;
      animation: speaker-glow 2s ease-in-out infinite;
      display: block;
      line-height: 0;
    }

    .speaker-icon svg { width: 100%; height: 100%; }

    #persistent-bg { position: fixed; inset: 0; z-index: 0; }

    .video-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .overlay-bg {
      position: absolute;
      inset: 0;
      background: rgba(6, 8, 22, 0.72);
      z-index: 1;
    }

    #scene1 {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 1;
      transition: opacity 1.2s ease;
      pointer-events: auto;
    }

    #scene1.fade-out { opacity: 0; pointer-events: none; }

    #particles-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    #text-group-top {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    #text-group-bottom {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .scene-line {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.4rem, 4.5vw, 2.8rem);
      letter-spacing: 1px;
      color: #dce4ff;
      white-space: nowrap;
      opacity: 0;
      text-shadow: 0 0 30px rgba(180, 200, 255, 0.35);
      transition: opacity 1.2s ease;
    }

    .scene-line.line-title {
      font-style: normal;
      font-weight: 400;
      font-size: clamp(2rem, 7vw, 4.2rem);
      letter-spacing: 4px;
      color: #e8edff;
      text-shadow: 0 0 40px rgba(200, 215, 255, 0.5);
    }

    .scene-line.line-small {
      font-size: clamp(1rem, 3vw, 1.8rem);
      letter-spacing: 3px;
    }

    .scene-line.visible { opacity: 1; }

    #scene2 { position: fixed; inset: 0; display: none; z-index: 10; }
    #scene2.visible { display: flex; }

    #constellation-wrapper { position: relative; z-index: 2; width: 100%; height: 100%; }
    #constellation-canvas { position: absolute; inset: 0; z-index: 1; }

    .constellation-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(255, 245, 160, 0.75);
      white-space: nowrap;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(180, 200, 255, 0.4);
      opacity: 0;
      animation: bubble-pop 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) 0.4s forwards;
      font-size: clamp(1rem, 2.8vw, 2.7rem);
      top: clamp(1.6rem, 4vh, 4.8rem);
    }

    @keyframes bubble-pop {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.4); filter: blur(6px); }
      55%  { opacity: 1; transform: translateX(-50%) scale(1.12); filter: blur(0px); }
      72%  { transform: translateX(-50%) scale(0.94); }
      88%  { transform: translateX(-50%) scale(1.04); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); filter: blur(0px); }
    }

    .star-wrapper {
      position: absolute;
      cursor: pointer;
      z-index: 4;
      transition: all 0.3s ease;
    }

    .star-hit {
      position: absolute;
      width: 40px;
      height: 40px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }

    .star {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e0e6ff;
      box-shadow: 0 0 6px rgba(224, 230, 255, 0.4);
      transition: all 0.5s ease;
      position: relative;
    }

    .star-wrapper.dim .star { background: #2a3560; box-shadow: 0 0 3px rgba(42, 53, 96, 0.4); }

    .star-wrapper.lit .star {
      background: #fffacd;
      box-shadow: 0 0 18px rgba(255, 250, 205, 0.9), 0 0 40px rgba(255, 210, 100, 0.6), 0 0 70px rgba(255, 180, 60, 0.3);
    }

    .star-wrapper.active .star { animation: star-pulse 2s ease-in-out infinite; }

    @keyframes star-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(224, 230, 255, 0.5); transform: scale(1); }
      50% { box-shadow: 0 0 28px rgba(224, 230, 255, 0.95), 0 0 50px rgba(180, 200, 255, 0.4); transform: scale(1.4); }
    }

    @keyframes speaker-glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(255, 250, 205, 0.6)) drop-shadow(0 0 20px rgba(255, 210, 100, 0.3)); }
      50% { filter: drop-shadow(0 0 22px rgba(255, 250, 205, 1)) drop-shadow(0 0 50px rgba(255, 210, 100, 0.7)); }
    }

    @keyframes finale-star-burst {
      0%   { transform: scale(1);   box-shadow: 0 0 18px rgba(255,250,205,0.9), 0 0 40px rgba(255,210,100,0.6), 0 0 70px rgba(255,180,60,0.3); }
      30%  { transform: scale(2.4); box-shadow: 0 0 40px rgba(255,250,205,1),   0 0 90px rgba(255,220,100,0.9), 0 0 140px rgba(255,180,60,0.6); }
      60%  { transform: scale(1.6); box-shadow: 0 0 28px rgba(255,250,205,0.95),0 0 60px rgba(255,210,100,0.75),0 0 100px rgba(255,180,60,0.45); }
      100% { transform: scale(1.8); box-shadow: 0 0 32px rgba(255,250,205,1),   0 0 70px rgba(255,220,100,0.85),0 0 120px rgba(255,180,60,0.55); }
    }

    .star-wrapper.finale-burst .star {
      animation: finale-star-burst 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-7px); }
      30%       { transform: translateX(7px); }
      45%       { transform: translateX(-6px); }
      60%       { transform: translateX(6px); }
      75%       { transform: translateX(-4px); }
      90%       { transform: translateX(4px); }
    }

    .shake {
      animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    /* ── STAR NOTE OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6, 8, 22, 0.88);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      padding: 2rem;
    }

    .overlay.open { display: flex; }

    .overlay-content {
      background: linear-gradient(135deg, rgba(28, 36, 70, 0.97) 0%, rgba(16, 20, 44, 0.97) 100%);
      border: 1px solid rgba(200, 215, 255, 0.18);
      border-radius: 6px;
      max-width: 600px;
      width: 100%;
      max-height: 82vh;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 0 50px rgba(180, 200, 255, 0.08), inset 0 0 30px rgba(180, 200, 255, 0.04);
      position: relative;
      animation: overlay-open 0.35s ease;
      overflow-y: auto;
    }

    @keyframes overlay-open {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    .close-btn {
      position: sticky;
      top: 0;
      align-self: flex-end;
      background: none;
      border: none;
      color: rgba(200, 215, 255, 0.5);
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      font-weight: 600;
      line-height: 1;
      z-index: 10;
      margin-bottom: -0.5rem;
    }

    .close-btn:hover { color: #e0e6ff; }

    .note-label {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #fffacd;
      text-shadow: 0 0 15px rgba(255, 250, 205, 0.4);
    }

    .divider { height: 1px; background: linear-gradient(to right, transparent, rgba(200, 215, 255, 0.25), transparent); flex-shrink: 0; }

    #lock-prompt { display: none; flex-direction: column; gap: 1.2rem; }
    #lock-prompt.active { display: flex; }

    .lock-question {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      line-height: 1.9;
      color: #c0d0f0;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .lock-input, .date-select {
      background: rgba(200, 215, 255, 0.05);
      border: 1px solid rgba(200, 215, 255, 0.18);
      border-radius: 4px;
      padding: 0.7rem;
      color: #e0e6ff;
      font-family: 'Cinzel', serif;
      font-size: 1.20rem;
      letter-spacing: 1px;
      outline: none;
      transition: all 0.2s;
    }

    .date-select option { background: #0e1230; color: #e0e6ff; }

    .lock-input:focus, .date-select:focus {
      border-color: rgba(255, 250, 205, 0.4);
      background: rgba(200, 215, 255, 0.09);
      box-shadow: 0 0 15px rgba(255, 250, 205, 0.15);
    }

    .date-row { display: flex; gap: 0.5rem; align-items: center; }

    .date-select {
      flex: 1;
      padding: 0.6rem 0.4rem;
      font-size: 1.20rem;
      background: #0e1230;
    }

    .date-sep { color: rgba(200, 215, 255, 0.4); font-weight: 600; }

    .lock-submit {
      align-self: flex-start;
      background: rgba(255, 250, 205, 0.12);
      border: 1px solid rgba(255, 250, 205, 0.28);
      color: #fffacd;
      padding: 0.65rem 1.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .lock-submit:hover { background: rgba(255, 250, 205, 0.22); box-shadow: 0 0 18px rgba(255, 250, 205, 0.18); }

    .lock-error {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      color: #ff7a88;
      letter-spacing: 1px;
      text-transform: uppercase;
      min-height: 1.5rem;
      display: none;
    }

    .lock-error.visible { display: block; }

    #note-content-view { display: none; }
    #note-content-view.active { display: block; }

    .note-content {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      line-height: 1.9;
      color: #ccd6f6;
      letter-spacing: 1px;
      text-align: left;
    }

    .note-content.urdu {
      text-align: right;
      font-family: 'Noto Nastaliq Urdu', serif;
      font-size: 1.1rem;
      line-height: 2.1;
      direction: rtl;
    }

    .note-content-para { margin-bottom: 1rem; }

    /* ── RESPONSIVE ── */
    .constellation-title {
      letter-spacing: clamp(2px, 0.8vw, 6px);
    }

    .notif-inner {
      padding: clamp(1rem, 2.5vw, 1.8rem) clamp(1.2rem, 4vw, 3.6rem);
    }
    .notif-text {
      font-size: clamp(0.75rem, 2vw, 1.2rem);
      letter-spacing: clamp(1px, 0.5vw, 3px);
      white-space: normal;
      text-align: center;
    }

    @media (hover: none) and (pointer: coarse) {
      .star-hit { width: 56px; height: 56px; }
      .star { width: 12px; height: 12px; }
    }

    #enter-screen p {
      font-size: clamp(0.85rem, 2.5vw, 1.8rem) !important;
      white-space: normal !important;
      text-align: center !important;
      padding: 0 1.5rem;
      max-width: 90vw;
    }
    .speaker-icon {
      width: clamp(56px, 10vw, 90px);
      height: clamp(56px, 10vw, 90px);
    }

    @media (max-width: 600px) {
      .scene-line { white-space: normal; text-align: center; padding: 0 1rem; }
      #text-group-top, #text-group-bottom { width: 90vw; }
    }

    .overlay { padding: clamp(0.8rem, 3vw, 2rem); }
    .overlay-content {
      padding: clamp(1.2rem, 4vw, 3rem);
      max-height: 92vh;
      gap: clamp(0.8rem, 2vw, 1.5rem);
    }
    .note-label { font-size: clamp(1.4rem, 4vw, 2.2rem); }
    .lock-question { font-size: clamp(0.8rem, 2vw, 1.25rem); }
    .lock-input, .date-select { font-size: clamp(0.85rem, 2vw, 1.2rem); }
    .lock-error { font-size: clamp(0.75rem, 1.8vw, 1.15rem); }
    .note-content { font-size: clamp(0.72rem, 1.6vw, 0.85rem); }
    .note-content.urdu { font-size: clamp(0.9rem, 2vw, 1.1rem); }

    #finale-overlay { padding: clamp(0.8rem, 3vw, 2rem); }
    .finale-overlay-content {
      padding: clamp(1.2rem, 4vw, 3rem);
      max-height: 92vh;
      gap: clamp(0.8rem, 2vw, 1.5rem);
    }
    .finale-note-label { font-size: clamp(1.4rem, 4vw, 2.2rem); }
    .finale-lock-question { font-size: clamp(0.8rem, 2vw, 1.25rem); }
    .finale-lock-input { font-size: clamp(0.85rem, 2vw, 1.2rem); }
    .finale-lock-error { font-size: clamp(0.75rem, 1.8vw, 1.15rem); }

    @media (max-width: 480px) {
      .overlay-content { padding: 1rem; border-radius: 4px; }
      .finale-overlay-content { padding: 1rem; border-radius: 4px; }
      .date-row { flex-wrap: wrap; }
      .lock-submit, .finale-lock-submit { font-size: 0.75rem; padding: 0.55rem 1rem; }
      #note-notification { bottom: 3rem; width: 90vw; left: 5vw; transform: translateY(80px); }
      #note-notification.show { transform: translateY(0); }
      #note-notification.hide { transform: translateY(-14px); }
    }

    /* ── FINALE OVERLAY ── */
    #finale-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 252, 240, 0.55);
      z-index: 9993;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 2rem;
    }

    #finale-overlay.open { display: flex; }

    .finale-overlay-content {
      background: linear-gradient(135deg, rgba(255, 252, 245, 0.97) 0%, rgba(255, 248, 230, 0.97) 100%);
      border: 1px solid rgba(180, 140, 60, 0.28);
      border-radius: 6px;
      max-width: 600px;
      width: 100%;
      max-height: 82vh;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      box-shadow: 0 0 50px rgba(200, 160, 80, 0.15), inset 0 0 30px rgba(200, 160, 80, 0.06);
      position: relative;
      animation: overlay-open 0.35s ease;
      overflow-y: auto;
    }

    .finale-note-label {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: #8b6914;
      text-shadow: 0 0 15px rgba(180, 130, 30, 0.25);
    }

    .finale-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(180, 140, 60, 0.35), transparent);
      flex-shrink: 0;
    }

    .finale-lock-question {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      line-height: 1.9;
      color: #5a4010;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .finale-lock-input {
      background: rgba(180, 140, 60, 0.07);
      border: 1px solid rgba(180, 140, 60, 0.28);
      border-radius: 4px;
      padding: 0.7rem;
      color: #3a2a05;
      font-family: 'Cinzel', serif;
      font-size: 1.20rem;
      letter-spacing: 1px;
      outline: none;
      transition: all 0.2s;
    }

    .finale-lock-input:focus {
      border-color: rgba(180, 130, 30, 0.55);
      background: rgba(180, 140, 60, 0.12);
      box-shadow: 0 0 15px rgba(180, 130, 30, 0.18);
    }

    .finale-lock-submit {
      align-self: flex-start;
      background: rgba(180, 140, 60, 0.14);
      border: 1px solid rgba(180, 130, 30, 0.38);
      color: #7a5a10;
      padding: 0.65rem 1.4rem;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .finale-lock-submit:hover {
      background: rgba(180, 140, 60, 0.26);
      box-shadow: 0 0 18px rgba(180, 130, 30, 0.2);
    }

    .finale-lock-error {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      color: #c0392b;
      letter-spacing: 1px;
      text-transform: uppercase;
      min-height: 1.5rem;
      display: none;
    }

    .finale-lock-error.visible { display: block; }

    /* ── NOTIFICATION ── */
    #note-notification {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 9999;
      opacity: 0;
      transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.55s ease;
      pointer-events: none;
    }

    #note-notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    #note-notification.hide {
      transform: translateX(-50%) translateY(-14px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .notif-inner {
      background: rgba(14, 18, 42, 0.93);
      border: 1px solid rgba(255, 245, 160, 0.2);
      border-radius: 18px;
      padding: 1.8rem 3.6rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      backdrop-filter: blur(12px);
      white-space: nowrap;
      box-shadow: 0 8px 36px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,245,160,0.07);
    }

    #note-notification.finale-notif .notif-inner {
      background: rgba(255, 250, 235, 0.96);
      border: 1px solid rgba(180, 140, 60, 0.3);
      box-shadow: 0 8px 36px rgba(180, 130, 30, 0.18), 0 0 0 1px rgba(180, 140, 60, 0.1);
    }

    #note-notification.finale-notif .notif-dot {
      background: #b8860b;
      box-shadow: 0 0 14px rgba(180, 130, 30, 0.7);
    }

    #note-notification.finale-notif .notif-text {
      color: rgba(80, 55, 10, 0.85);
    }

    #note-notification.finale-notif .notif-text em {
      color: #8b6914;
    }

    .notif-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fffacd;
      box-shadow: 0 0 14px rgba(255, 250, 205, 0.9);
      flex-shrink: 0;
    }

    .notif-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: rgba(200, 218, 255, 0.75);
      text-transform: uppercase;
    }

    .notif-text em { font-style: normal; color: #fffacd; }

    #finale-flash {
      position: fixed;
      inset: 0;
      z-index: 9990;
      background: rgba(255, 255, 240, 0);
      pointer-events: none;
      transition: none;
    }
  </style>
</head>

// ── CURSOR TRAIL ──
const trailCanvas = document.getElementById('cursor-trail-canvas-global');
const trailCtx = trailCanvas.getContext('2d');
trailCanvas.width = window.innerWidth;
trailCanvas.height = window.innerHeight;

const sparkles = [];
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let isMoving = false, moveTimer = null;
const cursorDot = { x: mouseX, y: mouseY, radius: 5, phase: 0 };

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY; isMoving = true;
  if (moveTimer) clearTimeout(moveTimer);
  moveTimer = setTimeout(() => { isMoving = false; }, 80);
  const count = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) spawnSparkle(mouseX, mouseY, true);
});

function spawnSparkle(x, y, moving) {
  const angle = Math.random() * Math.PI * 2;
  const speed = moving ? 0.4 + Math.random() * 1.2 : 0.1 + Math.random() * 0.4;
  const spread = moving ? 6 : 3;
  sparkles.push({
    x: x + (Math.random() - 0.5) * spread,
    y: y + (Math.random() - 0.5) * spread,
    size: moving ? 0.8 + Math.random() * 2.2 : 0.4 + Math.random() * 1.2,
    alpha: moving ? 0.55 + Math.random() * 0.45 : 0.2 + Math.random() * 0.3,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - (moving ? 0.3 : 0.15),
    decay: moving ? 0.022 + Math.random() * 0.028 : 0.008 + Math.random() * 0.012,
    color: Math.random() > 0.45 ? '#fffacd' : '#c8d8ff'
  });
}

let idleSparkleFrame = 0;
function emitIdleSparkles() {
  idleSparkleFrame++;
  if (!isMoving && idleSparkleFrame % 4 === 0) {
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) spawnSparkle(mouseX, mouseY, false);
  }
}

function animateTrail() {
  trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  emitIdleSparkles();
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx; s.y += s.vy; s.alpha -= s.decay;
    if (s.alpha <= 0) { sparkles.splice(i, 1); continue; }
    trailCtx.save();
    trailCtx.globalAlpha = s.alpha;
    trailCtx.fillStyle = s.color;
    trailCtx.shadowColor = s.color;
    trailCtx.shadowBlur = 5;
    trailCtx.beginPath();
    trailCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    trailCtx.fill();
    trailCtx.restore();
  }
  cursorDot.phase += 0.045;
  const pulse = 0.5 + 0.5 * Math.sin(cursorDot.phase);
  const haloR = 10 + 3 * pulse;
  const halo = trailCtx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, haloR);
  halo.addColorStop(0, `rgba(255, 250, 205, ${0.18 + 0.10 * pulse})`);
  halo.addColorStop(1, 'rgba(255, 250, 205, 0)');
  trailCtx.save(); trailCtx.fillStyle = halo; trailCtx.beginPath();
  trailCtx.arc(mouseX, mouseY, haloR, 0, Math.PI * 2); trailCtx.fill(); trailCtx.restore();
  trailCtx.save(); trailCtx.beginPath();
  trailCtx.arc(mouseX, mouseY, 3.5, 0, Math.PI * 2);
  trailCtx.fillStyle = '#fffacd'; trailCtx.shadowColor = '#fffacd';
  trailCtx.shadowBlur = 8 + 6 * pulse; trailCtx.globalAlpha = 0.92;
  trailCtx.fill(); trailCtx.restore();
  requestAnimationFrame(animateTrail);
}
animateTrail();

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;

    this.alpha = 0.4 + Math.random() * 0.6;
    this.size = 1 + Math.random() * 1.5;
  }
  draw() {
    pCtx.globalAlpha = this.alpha;
    pCtx.fillStyle = '#dce4ff';
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pCtx.fill();
  }
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
setTimeout(() => {

const starPositions = [
  { x: 0.18, y: 0.28 },
  { x: 0.65, y: 0.20 },
  { x: 0.30, y: 0.55 },
  { x: 0.72, y: 0.72 }
];

const unlocked = [false, false, false, false];
let currentNote = -1;
let conCanvas, conCtx;

function initScene2() {
  const scene2 = document.getElementById('scene2');
  scene2.classList.add('visible');
  conCanvas = document.getElementById('constellation-canvas');
  conCtx = conCanvas.getContext('2d');
  conCanvas.width = window.innerWidth;
  conCanvas.height = window.innerHeight;

  const ssCanvas = document.getElementById('shooting-star-canvas');
  const ssCtx = ssCanvas.getContext('2d');
  ssCanvas.width = window.innerWidth;
  ssCanvas.height = window.innerHeight;

  const activeStars = [];

  function spawnStar() {
    const angle = (22 + Math.random() * 24) * Math.PI / 180;
    const startX = Math.random() * ssCanvas.width * 0.75;
    const startY = Math.random() * ssCanvas.height * 0.38;
    const tailLen = 120 + Math.random() * 170;
    const speed = 5.5 + Math.random() * 4.5;
    activeStars.push({ startX, startY, angle, speed, tailLen, totalDist: tailLen * 2, progress: 0 });
  }

  function shootingStarLoop() {
    ssCtx.clearRect(0, 0, ssCanvas.width, ssCanvas.height);
    for (let i = activeStars.length - 1; i >= 0; i--) {
      const s = activeStars[i];
      s.progress += s.speed;
      const headX = s.startX + Math.cos(s.angle) * s.progress;
      const headY = s.startY + Math.sin(s.angle) * s.progress;
      const tailStartProg = Math.max(0, s.progress - s.tailLen);
      const tailX = s.startX + Math.cos(s.angle) * tailStartProg;
      const tailY = s.startY + Math.sin(s.angle) * tailStartProg;
      const fade = s.progress < s.tailLen
        ? s.progress / s.tailLen
        : 1 - (s.progress - s.tailLen) / s.tailLen;
      const grad = ssCtx.createLinearGradient(tailX, tailY, headX, headY);
      grad.addColorStop(0, 'rgba(255,250,220,0)');
      grad.addColorStop(0.6, `rgba(255,248,210,${fade * 0.5})`);
      grad.addColorStop(1, `rgba(255,255,240,${fade})`);
      ssCtx.save();
      ssCtx.strokeStyle = grad;
      ssCtx.lineWidth = 1.5;
      ssCtx.shadowColor = 'rgba(255,245,160,0.8)';
      ssCtx.shadowBlur = 6;
      ssCtx.beginPath();
      ssCtx.moveTo(tailX, tailY);
      ssCtx.lineTo(headX, headY);
      ssCtx.stroke();
      ssCtx.restore();
      if (s.progress >= s.totalDist) activeStars.splice(i, 1);
    }
    requestAnimationFrame(shootingStarLoop);
  }
  shootingStarLoop();

  function scheduleNext() {
    const interval = 500 + Math.random() * 700;
    setTimeout(() => {
      spawnStar();
      if (Math.random() > 0.45) setTimeout(spawnStar, 80 + Math.random() * 200);
      if (Math.random() > 0.72) setTimeout(spawnStar, 220 + Math.random() * 280);
      scheduleNext();
    }, interval);
  }
  spawnStar();
  setTimeout(scheduleNext, 500);

  window.addEventListener('resize', () => { ssCanvas.width = window.innerWidth; ssCanvas.height = window.innerHeight; });

  const container = document.getElementById('stars-container');
  starPositions.forEach((pos, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = `star-wrapper ${idx === 0 ? 'active' : 'dim'}`;
    wrapper.id = `star-${idx}`;
    wrapper.style.left = (pos.x * 100) + '%';
    wrapper.style.top  = (pos.y * 100) + '%';
    wrapper.style.transform = 'translate(-50%, -50%)';
    wrapper.onclick = () => clickStar(idx);
    wrapper.addEventListener('mouseenter', () => {
      if (!wrapper.classList.contains('active') && !wrapper.classList.contains('lit')) return;
      const p = getStarPx(idx);
      const duration = 700, maxR = 22, start = Date.now();
      function ripple() {
        const t = Math.min(1, (Date.now() - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const r = maxR * eased, alpha = (1 - t) * 0.55;
        redrawConstellation();
        conCtx.save();
        conCtx.beginPath();
        conCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
        conCtx.strokeStyle = `rgba(200, 220, 255, ${alpha})`;
        conCtx.lineWidth = 1;
        conCtx.shadowColor = 'rgba(200, 220, 255, 0.4)';
        conCtx.shadowBlur = 5;
        conCtx.stroke();
        conCtx.restore();
        if (t < 1) requestAnimationFrame(ripple);
      }
      ripple();
    });
    const hit = document.createElement('div'); hit.className = 'star-hit';
    const star = document.createElement('div'); star.className = 'star';
    wrapper.appendChild(hit); wrapper.appendChild(star);
    container.appendChild(wrapper);
  });

  drawConstellationAnimated();
  (function pulseLoop() {
    if (drawnGlow.length > 0 || finaleBeams.length > 0) redrawConstellation();
    requestAnimationFrame(pulseLoop);
  })();
}

function getStarPx(idx) {
  return { x: starPositions[idx].x * conCanvas.width, y: starPositions[idx].y * conCanvas.height };
}

function animateLine(fromIdx, toIdx, duration, color, lineWidth) {
  return new Promise(resolve => {
    const from = getStarPx(fromIdx), to = getStarPx(toIdx), start = Date.now();
    function frame() {
      const t = Math.min(1, (Date.now() - start) / duration);
      const cx = from.x + (to.x - from.x) * t, cy = from.y + (to.y - from.y) * t;
      redrawConstellation();
      conCtx.save();
      conCtx.strokeStyle = color || 'rgba(200, 215, 255, 0.35)';
      conCtx.lineWidth = lineWidth || 1;
      conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(cx, cy); conCtx.stroke();
      conCtx.restore();
      if (t < 1) requestAnimationFrame(frame); else resolve();
    }
    frame();
  });
}

const drawnSegments = [], drawnGlow = [];
const finaleBeams = [];

function redrawConstellation() {
  conCtx.clearRect(0, 0, conCanvas.width, conCanvas.height);

  drawnSegments.forEach(seg => {
    const from = getStarPx(seg), to = getStarPx(seg + 1);
    conCtx.save();
    conCtx.strokeStyle = 'rgba(200, 215, 255, 0.25)';
    conCtx.lineWidth = 1;
    conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(to.x, to.y); conCtx.stroke();
    conCtx.restore();
  });

  drawnGlow.forEach(g => {
    const from = getStarPx(g.from), to = getStarPx(g.to);
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 1400 + g.from);
    const opacity = 0.45 + 0.35 * pulse, blur = 6 + 10 * pulse, width = 1.2 + 0.8 * pulse;
    conCtx.save();
    conCtx.strokeStyle = `rgba(255, 245, 160, ${opacity})`;
    conCtx.lineWidth = width;
    conCtx.shadowColor = 'rgba(255, 220, 80, 0.6)';
    conCtx.shadowBlur = blur;
    conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(to.x, to.y); conCtx.stroke();
    conCtx.restore();
  });

  finaleBeams.forEach(b => {
    if (b.progress <= 0) return;
    const from = getStarPx(b.from), to = getStarPx(b.to);
    const cx = from.x + (to.x - from.x) * b.progress;
    const cy = from.y + (to.y - from.y) * b.progress;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 900 + b.from * 1.3);
    conCtx.save();
    conCtx.strokeStyle = `rgba(255, 245, 160, ${0.75 + 0.25 * pulse})`;
    conCtx.lineWidth = 2 + pulse * 0.8;
    conCtx.shadowColor = 'rgba(255, 220, 80, 0.85)';
    conCtx.shadowBlur = 14 + 8 * pulse;
    conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(cx, cy); conCtx.stroke();
    conCtx.restore();
  });
}

async function drawConstellationAnimated() {
  for (let i = 0; i < starPositions.length - 1; i++) {
    await delay(500);
    await animateLine(i, i + 1, 900, 'rgba(200, 215, 255, 0.35)', 1);
    drawnSegments.push(i);
    redrawConstellation();
  }
}

function illuminatePathway(fromIdx, toIdx) {
  return new Promise(resolve => {
    const from = getStarPx(fromIdx), to = getStarPx(toIdx);
    const start = Date.now(), duration = 2800;
    function frame() {
      const t = Math.min(1, (Date.now() - start) / duration);
      const eased = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
      redrawConstellation();
      const cx = from.x + (to.x - from.x) * eased, cy = from.y + (to.y - from.y) * eased;
      conCtx.save();
      conCtx.strokeStyle = 'rgba(255, 245, 160, 0.85)';
      conCtx.lineWidth = 2;
      conCtx.shadowColor = 'rgba(255, 220, 80, 0.7)';
      conCtx.shadowBlur = 12;
      conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(cx, cy); conCtx.stroke();
      conCtx.restore();
      if (t < 1) requestAnimationFrame(frame);
      else { drawnGlow.push({ from: fromIdx, to: toIdx }); triggerStarImpact(toIdx); resolve(); }
    }
    frame();
  });
}

function triggerStarImpact(idx) {
  const pos = getStarPx(idx);
  [{ delay: 0, maxR: 28, duration: 700 }, { delay: 140, maxR: 46, duration: 850 }, { delay: 300, maxR: 64, duration: 1000 }]
    .forEach(({ delay, maxR, duration }) => {
      setTimeout(() => {
        const start = Date.now();
        function frame() {
          const t = Math.min(1, (Date.now() - start) / duration);
          const r = maxR * t, alpha = (1 - t) * 0.75;
          redrawConstellation();
          conCtx.save();
          conCtx.beginPath();
          conCtx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
          conCtx.strokeStyle = `rgba(255, 245, 160, ${alpha})`;
          conCtx.lineWidth = 1.5;
          conCtx.shadowColor = 'rgba(255, 220, 80, 0.4)';
          conCtx.shadowBlur = 8;
          conCtx.stroke();
          conCtx.restore();
          if (t < 1) requestAnimationFrame(frame);
        }
        frame();
      }, delay);
    });
}

function dudPathway(fromIdx, toIdx) {
  return new Promise(resolve => {
    const from = getStarPx(fromIdx), to = getStarPx(toIdx);
    const fizzleAt = 0.55 + Math.random() * 0.1;
    const drawDuration = 1800, retractDuration = 900;
    let fizzleX, fizzleY;
    const drawStart = Date.now();
    function drawFrame() {
      const t = Math.min(1, (Date.now() - drawStart) / drawDuration);
      const eased = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
      const progress = eased * fizzleAt;
      fizzleX = from.x + (to.x - from.x) * progress;
      fizzleY = from.y + (to.y - from.y) * progress;
      redrawConstellation();
      conCtx.save();
      conCtx.strokeStyle = 'rgba(255, 245, 160, 0.85)';
      conCtx.lineWidth = 2;
      conCtx.shadowColor = 'rgba(255, 220, 80, 0.7)';
      conCtx.shadowBlur = 12;
      conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(fizzleX, fizzleY); conCtx.stroke();
      conCtx.restore();
      if (t < 1) { requestAnimationFrame(drawFrame); }
      else {
        const retractStart = Date.now();
        function retractFrame() {
          const rt = Math.min(1, (Date.now() - retractStart) / retractDuration);
          const easedR = rt * rt;
          const headX = fizzleX + (from.x - fizzleX) * easedR;
          const headY = fizzleY + (from.y - fizzleY) * easedR;
          redrawConstellation();
          conCtx.save();
          conCtx.strokeStyle = 'rgba(255, 245, 160, 0.85)';
          conCtx.lineWidth = 2;
          conCtx.shadowColor = 'rgba(255, 220, 80, 0.7)';
          conCtx.shadowBlur = 12;
          conCtx.beginPath(); conCtx.moveTo(from.x, from.y); conCtx.lineTo(headX, headY); conCtx.stroke();
          conCtx.restore();
          if (rt < 1) requestAnimationFrame(retractFrame);
          else { redrawConstellation(); resolve(); }
        }
        requestAnimationFrame(retractFrame);
      }
    }
    requestAnimationFrame(drawFrame);
  });
}

async function triggerFinale() {
  if (finaleTriggered) return;
  finaleTriggered = true;

  for (let i = 0; i < starPositions.length; i++) {
    await delay(200);
    const starEl = document.getElementById(`star-${i}`);
    starEl.classList.remove('active', 'dim', 'lit');
    void starEl.querySelector('.star').offsetWidth;
    starEl.classList.add('lit', 'finale-burst');
    triggerStarImpact(i);
  }

  await delay(500);

  const pairs = [[0,1],[1,2],[2,3],[0,2],[1,3],[0,3]];
  pairs.forEach(([a, b]) => finaleBeams.push({ from: a, to: b, progress: 0 }));

  const beamDuration = 1400;
  const beamStart = Date.now();

  await new Promise(resolve => {
    function beamFrame() {
      const t = Math.min(1, (Date.now() - beamStart) / beamDuration);
      const eased = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
      finaleBeams.forEach(b => { b.progress = eased; });
      if (t < 1) requestAnimationFrame(beamFrame);
      else resolve();
    }
    beamFrame();
  });

  finaleBeams.forEach(b => { drawnGlow.push({ from: b.from, to: b.to }); });
  finaleBeams.length = 0;
  starPositions.forEach((_, i) => {
    const starEl = document.getElementById(`star-${i}`);
    starEl.classList.remove('finale-burst');
    starEl.classList.add('lit');
  });

  // Fade music out
  if (bgAudio) {
    const fadeMusic = setInterval(() => {
      bgAudio.volume = Math.max(0, bgAudio.volume - 0.04);

  }

  // Fade white screen in
  const flashEl = document.getElementById('finale-flash');
  flashEl.style.transition = 'background 1.8s ease';
  flashEl.style.background = '#ffffff';

  await delay(1900);
  document.getElementById('finale-overlay').classList.add('open');

  document.getElementById('finale-lock-error').textContent = '';
  document.getElementById('finale-lock-error').classList.remove('visible');
  setTimeout(() => document.getElementById('finale-lock-input').focus(), 100);
}

function playFinaleVideo() {
  const flashEl = document.getElementById('finale-flash');

  const vid = document.createElement('video');
  const isMobile = window.innerHeight > window.innerWidth;
  vid.src = isMobile ? 'manwa_re_mobile.mp4' : 'manwa_re.mp4';
  vid.style.cssText = `
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 9995;
    opacity: 0;
    pointer-events: none;
  `;
  vid.playsInline = true;
  vid.preload = 'auto';
  document.body.appendChild(vid);

  vid.play().catch(e => console.log('video play error:', e));

  // ── FIX: 3 second fade in ──
  const videoFadeDuration = 3000;
  const whiteFadeDuration = 5000;
  const fadeStart = Date.now();
  function fadeFrame() {
    const elapsed = Date.now() - fadeStart;
    const videoT = Math.min(1, elapsed / videoFadeDuration);
    const whiteT = Math.min(1, elapsed / whiteFadeDuration);
    vid.style.opacity = videoT;
    flashEl.style.background = `rgba(255, 255, 255, ${1 - whiteT})`;
    if (whiteT < 1) requestAnimationFrame(fadeFrame);
    else {
      flashEl.style.transition = 'none';
      flashEl.style.background = 'none';
    }
  }
  fadeFrame();

  let audioFading = false;
  vid.addEventListener('timeupdate', () => {
    if (!audioFading && vid.duration && (vid.duration - vid.currentTime) <= 4) {
      audioFading = true;
      const totalFade = 4000;
      const startVol = vid.volume;
      const fadeStart = Date.now();
      const fadeAudio = setInterval(() => {
        const t = Math.min(1, (Date.now() - fadeStart) / totalFade);
        vid.volume = startVol * (1 - t);
        if (t >= 1) { vid.volume = 0; clearInterval(fadeAudio); }
      }, 50);
    }
  });

  vid.addEventListener('ended', async () => {
    vid.style.opacity = 0;
    flashEl.style.transition = 'none';
    flashEl.style.opacity = 1;
    flashEl.style.background = '#000000';
    document.body.removeChild(vid);

    await delay(600);

    resetAllState();

    const enterScreen = document.getElementById('enter-screen');
    enterScreen.style.opacity = '0';
    enterScreen.style.transition = 'none';
    enterScreen.style.display = 'flex';

    await delay(50);

    enterScreen.style.transition = 'opacity 1.8s ease';
    enterScreen.style.opacity = '1';

    flashEl.style.transition = 'background 1.8s ease';
    flashEl.style.background = 'rgba(0,0,0,0)';

    await delay(1800);
    flashEl.style.background = 'none';
  });
}

    el.classList.remove('finale-notif');
  }

  if (_notifTimer) { clearTimeout(_notifTimer); _notifTimer = null; }
  el.classList.remove('hide', 'show');
  void el.offsetWidth;
  el.classList.add('show');

  _notifTimer = setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('hide');
    _notifTimer = setTimeout(() => {
      el.classList.remove('hide');
      if (_finaleNotifPending) {
        _finaleNotifPending = false;
        el.classList.remove('finale-notif');
        playFinaleVideo();
      }
    }, 500);
  }, 3600);
}

// ── STAR CLICK / NOTES ──
const trolled = [false, false, false, false];

function clickStar(idx) {
  const passedCount = unlocked.filter(v => v).length;
  if (idx !== passedCount && !unlocked[idx] && !trolled[idx]) return;
  currentNote = idx;
  const note = notes[idx];
  document.getElementById('note-label').textContent = note.label;
  document.getElementById('lock-error').textContent = '';
  document.getElementById('lock-error').classList.remove('visible');

  if (idx === 3 && unlocked[idx] && !finaleTriggered) {
    fourthNoteOpenedWhileUnlocked = true;
  }

  if (unlocked[idx]) showNoteContent(idx);
  else if (note.subLock && trolled[idx]) showLockPrompt(note.subLock);
  else showLockPrompt(note);
  document.getElementById('overlay').classList.add('open');
}

function showLockPrompt(source) {
  document.getElementById('lock-prompt').classList.add('active');
  document.getElementById('note-content-view').classList.remove('active');
  document.getElementById('lock-question').textContent = source.question;
  document.getElementById('lock-error').textContent = '';
  document.getElementById('lock-error').classList.remove('visible');
  const isDate = source.type === 'date';
  document.getElementById('lock-text-input').style.display = isDate ? 'none' : 'block';
  document.getElementById('lock-date-row').style.display = isDate ? 'flex' : 'none';
  if (!isDate) {
    document.getElementById('lock-text-input').value = '';
    setTimeout(() => document.getElementById('lock-text-input').focus(), 100);
  } else { ddEl.value = ''; mmEl.value = ''; yyyyEl.value = ''; }
}

function showNoteContent(idx) {
  document.getElementById('lock-prompt').classList.remove('active');
  document.getElementById('note-content-view').classList.add('active');
  const body = notes[idx].body;
  const paragraphs = body.split('\n\n');
  let html = '';
  paragraphs.forEach(para => {
    const hasUrdu = /[\u0600-\u06FF]/.test(para);
    const cls = hasUrdu ? 'note-content urdu' : 'note-content';
    html += `<div class="${cls} note-content-para">${para.split('\n').join('<br>')}</div>`;
  });
  document.getElementById('note-body').innerHTML = html;
}

function submitAnswer() {
  const idx = currentNote;
  const note = notes[idx];
  const onSubLock = note.subLock && trolled[idx];
  const source = onSubLock ? note.subLock : note;

  let userAnswer = '';
  if (source.type === 'date') {
    const d = ddEl.value, m = mmEl.value, y = yyyyEl.value;
    if (!d || !m || !y) { showError(source.errorMsg, source.type); return; }
    userAnswer = `${d}/${m}/${y}`;
  } else {
    userAnswer = document.getElementById('lock-text-input').value.trim();
  }

  const correct = userAnswer.toLowerCase() === source.answer.toLowerCase()
    || (source.altAnswer && userAnswer.toLowerCase() === source.altAnswer.toLowerCase());

  if (correct) {
    if (!onSubLock && note.subLock) {
      trolled[idx] = true;
      const starEl = document.getElementById(`star-${idx}`);
      starEl.classList.remove('active', 'dim');
      starEl.classList.add('lit');
      triggerStarImpact(idx);
      closeNote();
      setTimeout(() => {
        dudPathway(idx, idx + 1).then(() => {
          starEl.classList.remove('lit');
          starEl.classList.add('active');
          setTimeout(() => { showNotificationCustom(note.trollNotif || 'hehe ye toh annoy krne k lye daala tha'); }, 400);
        });
      }, 800);
    } else {
      unlocked[idx] = true;
      const starEl = document.getElementById(`star-${idx}`);
      starEl.classList.remove('active', 'dim');
      starEl.classList.add('lit');
      triggerStarImpact(idx);
      const pathFrom = idx;
      const isLast = pathFrom === starPositions.length - 1;
      closeNote();
      if (!isLast) {
        setTimeout(() => {
          showNotification(notes[pathFrom].label);
          illuminatePathway(pathFrom, pathFrom + 1).then(() => {
            const nextStar = document.getElementById(`star-${pathFrom + 1}`);
            nextStar.classList.remove('dim');
            nextStar.classList.add('active');
          });
        }, 1300);
      } else {
        setTimeout(() => {
          showNotification(notes[pathFrom].label);
        }, 1300);
      }
    }
  } else {
    if (!onSubLock && source.specialAnswer && userAnswer.toLowerCase() === source.specialAnswer.toLowerCase()) {
      showError(source.specialErrorMsg, source.type);
    } else {
      showError(source.errorMsg, source.type);
    }
  }
}

function showError(msg, type) {
  const errEl = document.getElementById('lock-error');
  errEl.textContent = msg;
  errEl.classList.add('visible');

  const isDate = type === 'date';
  const targetEl = isDate
    ? document.getElementById('lock-date-row')
    : document.getElementById('lock-text-input');

  targetEl.classList.remove('shake');
  void targetEl.offsetWidth;
  targetEl.classList.add('shake');
}

function closeNote() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('lock-prompt').classList.remove('active');
  document.getElementById('note-content-view').classList.remove('active');

  if (fourthNoteOpenedWhileUnlocked && !finaleTriggered) {
    fourthNoteOpenedWhileUnlocked = false;
    setTimeout(() => triggerFinale(), 1200);
  }
}

function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeNote(); }

window.addEventListener('resize', () => {
  if (conCanvas) {
    conCanvas.width = window.innerWidth;
    conCanvas.height = window.innerHeight;
    redrawConstellation();
  }
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  setTimeout(() => {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles.forEach(p => p.draw());
    pCtx.globalAlpha = 1;
  }, 50);
});
